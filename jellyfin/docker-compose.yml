services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ${HOME}/docker/jellyfin/config:/config
      - ${HOME}/docker/jellyfin/cache:/cache
      - type: bind
        source: /mnt/truenas/jellyfin
        target: /media
        read_only: true
    restart: 'unless-stopped'