version: '3'
services:
  bot:
    image: ghcr.io/johnmasayume/discord-bot/discord-bot-rem:latest
    container_name: discord-bot-rem
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OWNER_ID=${OWNER_ID}
      - WISE_API_TOKEN=${WISE_API_TOKEN}
      - WISE_TARGET=${WISE_TARGET}
      - WISE_SOURCE=${WISE_SOURCE}
      - WISE_TARGET_RATE=${WISE_TARGET_RATE}
      - WISE_TARGET_AMOUNT=${WISE_TARGET_AMOUNT}
      - PRIVATE_CHANNEL_ID=${PRIVATE_CHANNEL_ID}
      - GENERAL_CHANNEL_ID=${GENERAL_CHANNEL_ID}
      - LOG_CHANNEL_CATEGORY_ID=${LOG_CHANNEL_CATEGORY_ID}
      - LOG_CHANNEL_ID_BIRTHDAY=${LOG_CHANNEL_ID_BIRTHDAY}
      - LOG_CHANNEL_ID_EXCHANGE_RATE=${LOG_CHANNEL_ID_EXCHANGE_RATE}
      - LOG_CHANNEL_ID_VERSION=${LOG_CHANNEL_ID_VERSION}
      - GH_PAT=${GH_PAT}
    restart: unless-stopped
